{% extends "base.html" %}
{% block title %}Notas · draw-study{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Notas</h1>

<form method="post" action="/notes" class="mb-8 max-w-2xl space-y-2">
  <input name="title" value="{{ new_title }}" placeholder="título da nota" required
         class="w-full rounded border border-neutral-300 bg-neutral-50 px-3 py-2 text-sm focus:border-amber-500 focus:outline-none">
  <textarea name="body" rows="4" placeholder="conteúdo em markdown… use [[Outra nota]] p/ vincular"
            class="w-full rounded border border-neutral-300 bg-neutral-50 px-3 py-2 text-sm font-mono focus:border-amber-500 focus:outline-none"></textarea>
  <button class="rounded bg-amber-600 px-4 py-2 text-sm font-medium text-black hover:bg-amber-500">Criar nota</button>
</form>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 max-w-4xl">
  {% for n in notes %}
  <a href="/note/{{ n.id }}" class="rounded border border-neutral-200 bg-white p-4 hover:border-amber-600">
    <p class="font-medium text-neutral-800 truncate">{{ n.title }}</p>
    <p class="text-xs text-neutral-500 mt-1">{% if n.study_id %}↳ vinculada a estudo{% else %}nota avulsa{% endif %}</p>
  </a>
  {% else %}
  <p class="text-sm text-neutral-400">Nenhuma nota ainda.</p>
  {% endfor %}
</div>
{% endblock %}
