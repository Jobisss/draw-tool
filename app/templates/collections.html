{% extends "base.html" %}
{% block title %}Coleções · draw-study{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Coleções</h1>

<form hx-post="/collections" hx-target="#col-list" hx-swap="outerHTML"
      hx-on::after-request="this.reset()" class="flex gap-2 mb-6 max-w-md">
  <input name="name" placeholder="nome da coleção" required
         class="flex-1 rounded border border-neutral-300 bg-neutral-50 px-3 py-2 text-sm focus:border-amber-500 focus:outline-none">
  <button class="rounded bg-amber-600 px-4 py-2 text-sm font-medium text-black hover:bg-amber-500">Criar</button>
</form>

{% include "partials/collections_list.html" %}
{% endblock %}
