{% extends "base.html" %}
{% block title %}Praticar · draw-study{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Praticar — gesture / timed drawing</h1>

<div id="setup" class="rounded border border-neutral-200 bg-white p-5 max-w-xl">
  <div class="flex flex-wrap gap-3 items-end">
    <label class="text-sm">Técnica
      <select id="tech" class="block mt-1 rounded border border-neutral-300 bg-neutral-50 px-2 py-1.5 text-sm">
        <option value="">todas</option>
        {% for t in technique_tags %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}
      </select>
    </label>
    <label class="text-sm">Quantidade
      <input id="count" type="number" value="20" min="1" max="200" class="block mt-1 w-24 rounded border border-neutral-300 bg-neutral-50 px-2 py-1.5 text-sm">
    </label>
    <label class="text-sm">Tempo/imagem
      <select id="dur" class="block mt-1 rounded border border-neutral-300 bg-neutral-50 px-2 py-1.5 text-sm">
        <option value="30">30s</option>
        <option value="60" selected>1min</option>
        <option value="120">2min</option>
        <option value="300">5min</option>
      </select>
    </label>
    <button id="start" class="rounded bg-amber-600 px-4 py-2 text-sm font-medium text-black hover:bg-amber-500">Começar</button>
  </div>
  <p id="msg" class="text-sm text-neutral-500 mt-3"></p>
</div>

<div id="player" class="hidden">
  <div class="flex items-center justify-between mb-3">
    <span id="progress" class="text-sm text-neutral-600"></span>
    <span id="timer" class="text-3xl font-mono font-semibold text-amber-600">--</span>
    <div class="flex gap-2">
      <button id="pause" class="rounded border border-neutral-300 px-3 py-1.5 text-sm hover:bg-neutral-100">Pausar</button>
      <button id="next" class="rounded border border-neutral-300 px-3 py-1.5 text-sm hover:bg-neutral-100">Pular →</button>
      <button id="stop" class="rounded border border-red-300 px-3 py-1.5 text-sm text-red-600 hover:bg-red-950/40">Parar</button>
    </div>
  </div>
  <div class="rounded border border-neutral-200 bg-neutral-50 flex items-center justify-center" style="height:75vh">
    <img id="pimg" class="max-h-full max-w-full object-contain" alt="referência">
  </div>
</div>

<script>
(function(){
  let ids=[], i=0, dur=60, left=60, timer=null, paused=false;
  const $ = id => document.getElementById(id);

  $('start').addEventListener('click', async () => {
    const tech = $('tech').value, count = $('count').value;
    const url = '/practice/queue.json?count=' + count + (tech ? '&tag=' + tech : '');
    const r = await fetch(url); const data = await r.json();
    ids = data.ids;
    if(!ids.length){ $('msg').textContent = 'Nenhuma imagem raster encontrada (indexe o vault / escolha outra técnica).'; return; }
    dur = parseInt($('dur').value,10);
    i = 0; paused = false;
    $('setup').classList.add('hidden'); $('player').classList.remove('hidden');
    show();
  });

  function show(){
    if(i >= ids.length){ stop(); return; }
    $('pimg').src = '/file/' + ids[i];
    $('progress').textContent = (i+1) + ' / ' + ids.length;
    left = dur; render(); clearInterval(timer);
    timer = setInterval(tick, 1000);
  }
  function tick(){ if(paused) return; left--; render(); if(left<=0){ i++; show(); } }
  function render(){ const m=Math.floor(left/60), s=left%60; $('timer').textContent = m+':' + String(s).padStart(2,'0'); }
  function stop(){ clearInterval(timer); $('player').classList.add('hidden'); $('setup').classList.remove('hidden'); $('msg').textContent = 'Sessão encerrada.'; }

  $('pause').addEventListener('click', () => { paused=!paused; $('pause').textContent = paused?'Continuar':'Pausar'; });
  $('next').addEventListener('click', () => { i++; show(); });
  $('stop').addEventListener('click', stop);
})();
</script>
{% endblock %}
