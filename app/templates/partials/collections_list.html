<div id="col-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-w-3xl">
  {% for c in collections %}
  <a href="/?collection={{ c.id }}"
     class="rounded border border-neutral-200 bg-white p-4 hover:border-amber-600">
    <p class="font-medium text-neutral-800">{{ c.name }}</p>
    <p class="text-xs text-neutral-500">{{ c.n }} estudo(s)</p>
  </a>
  {% else %}
  <p class="text-sm text-neutral-400">Nenhuma coleção ainda.</p>
  {% endfor %}
</div>
