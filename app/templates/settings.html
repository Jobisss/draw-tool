{% extends "base.html" %}
{% block title %}Configurações · draw-study{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Configurações</h1>

<section class="rounded border border-neutral-200 bg-white p-6 max-w-2xl">
  <h2 class="font-medium mb-1">Vault (pasta-cofre)</h2>
  <p class="text-sm text-neutral-600 mb-4">
    Pasta raiz com seus desenhos. O app só <strong>lê</strong> — nunca altera arquivos (RF05/RNF04).
  </p>

  <form hx-post="/settings/vault" hx-target="#vault-status" hx-swap="outerHTML" class="flex gap-2">
    <input
      type="text" name="vault_path" value="{{ vault or '' }}"
      placeholder="E:\caminho\para\seus\desenhos"
      class="flex-1 rounded border border-neutral-300 bg-neutral-50 px-3 py-2 text-sm focus:border-amber-500 focus:outline-none">
    <button type="submit"
      class="rounded bg-amber-600 px-4 py-2 text-sm font-medium text-black hover:bg-amber-500">
      Salvar
    </button>
  </form>

  {% include "partials/vault_status.html" %}
</section>
{% endblock %}
